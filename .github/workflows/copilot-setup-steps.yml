---
name: "Copilot Setup Steps"

"on": workflow_dispatch

# Least privilege: this workflow only provisions a build environment.
permissions:
  contents: read

jobs:
  copilot-setup-steps:
    name: Copilot coding agent environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Rust toolchain
        # master
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo registry
        # v5.0.3
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-copilot-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-copilot-

      - name: Install cargo-deny
        # v2.67.25
        uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9
        with:
          tool: cargo-deny

      - name: Fetch dependencies
        run: cargo fetch
