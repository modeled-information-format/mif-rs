name: Mutation Testing

on:
  pull_request:
    paths:
      # Source lives in crates/ (not src/) — see ADR-0002.
      - 'crates/**'
      - 'tests/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:
    inputs:
      target:
        description: 'Target file or module to mutate'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  mutation-test:
    name: Mutation Testing with cargo-mutants
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: target
          key: ${{ runner.os }}-target-mutation-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-mutants
        # Build from crates.io with --locked: robust and version-pinned, with
        # no dependency on a prebuilt-binary install manifest.
        run: cargo install --locked --version 27.1.0 cargo-mutants

      - name: Run mutation tests
        run: |
          if [ -n "${{ github.event.inputs.target }}" ]; then
            cargo mutants --file "${{ github.event.inputs.target }}" --output mutants.out --json
          else
            cargo mutants --output mutants.out --json --timeout 300
          fi
        continue-on-error: true

      - name: Generate mutation report
        if: always()
        run: |
          # shellcheck disable=SC2129
          {
            echo "# Mutation Testing Report"
            echo ""
            if [ -f mutants.out/mutants.json ]; then
              echo "## Summary"
              jq -r '.summary | "- Total mutants: \(.total)\n- Caught: \(.caught)\n- Missed: \(.missed)\n- Timeout: \(.timeout)\n- Score: \(.score)%"' mutants.out/mutants.json
              echo ""
              echo "## Missed Mutants (Require Attention)"
              echo ""
              jq -r '.mutants[] | select(.outcome == "missed") | "### \(.function)\n\n**File:** \(.file):\(.line)\n\n**Mutation:** \(.replacement)\n\n---\n"' mutants.out/mutants.json || echo "No missed mutants"
            else
              echo "Mutation testing output not found"
            fi
          } > mutation-report.md

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: mutation-test-report
          path: |
            mutation-report.md
            mutants.out/
          retention-days: 30
