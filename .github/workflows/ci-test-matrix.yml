---
name: Test Matrix

"on":
  workflow_call:
    inputs:
      msrv:
        description: "Minimum supported Rust version"
        type: string
        default: "1.92"
  workflow_dispatch:
    inputs:
      msrv:
        description: "Minimum supported Rust version"
        type: string
        default: "1.92"

permissions:
  contents: read

jobs:
  test-matrix:
    name: >-
      Test on ${{ matrix.os }} / Rust ${{ matrix.rust }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        rust:
          - stable
          - beta
          - nightly
          - "${{ inputs.msrv || '1.92' }}"
        include:
          - os: ubuntu-latest
            rust: stable
            features: "--all-features"
          - os: ubuntu-latest
            rust: stable
            features: "--no-default-features"
        exclude:
          - os: macos-latest
            rust: beta
          - os: windows-latest
            rust: beta
    steps:
      - name: Checkout code
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Rust ${{ matrix.rust }}
        # master
        uses: >-
          dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache dependencies
        # v5.0.3
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: >-
            ${{ runner.os }}-${{ matrix.rust }}-cargo-${{
            hashFiles('**/Cargo.lock') }}

      - name: Check formatting (stable only)
        if: >-
          matrix.rust == 'stable'
          && matrix.os == 'ubuntu-latest'
        run: |
          rustup component add rustfmt
          cargo fmt --all -- --check

      - name: Run clippy (stable only)
        if: >-
          matrix.rust == 'stable'
          && matrix.os == 'ubuntu-latest'
        run: |
          rustup component add clippy
          cargo clippy --all-targets \
            ${{ matrix.features || '--all-features' }} \
            -- -D warnings

      - name: Build
        run: cargo build --verbose ${{ matrix.features || '' }}

      - name: Run tests
        run: cargo test --verbose ${{ matrix.features || '' }}

      - name: Run doc tests
        run: cargo test --doc ${{ matrix.features || '' }}

      - name: Check documentation
        if: matrix.rust == 'stable'
        run: >-
          cargo doc --no-deps
          ${{ matrix.features || '--all-features' }}

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Rust
        # master
        uses: >-
          dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537
        with:
          toolchain: stable

      - name: Cache dependencies
        # v5.0.3
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: >-
            ${{ runner.os }}-cargo-integration-${{
            hashFiles('**/Cargo.lock') }}

      - name: Run integration tests
        run: cargo test --test '*' --verbose

  miri:
    name: Miri (Undefined Behavior Detection)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Rust nightly with miri
        # master
        uses: >-
          dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537
        with:
          toolchain: nightly
          components: miri

      - name: Run miri
        run: >-
          cargo miri test ||
          echo "Miri tests failed - review for UB"
        continue-on-error: true

  test-report:
    name: Generate Test Report
    runs-on: ubuntu-latest
    needs: [test-matrix, integration-tests]
    if: always()
    steps:
      - name: Generate report
        run: |
          {
            echo "# Test Matrix Results"
            echo ""
            echo "Test matrix completed."
            echo "Check individual job results above."
          } > test-report.md

      - name: Upload report
        # v4.6.2
        uses: >-
          actions/upload-artifact@47309c993abb98030a35d55ef7ff34b7fa1074b5
        with:
          name: test-matrix-report
          path: test-report.md
          retention-days: 30
