name: Benchmark Regression Detection

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Read-only: the job runs benchmarks and uploads an artifact; it never
# commits, pushes, or comments back to the repo or PR.
permissions:
  contents: read

jobs:
  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable

      - name: Cache dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-criterion
        # Pinned + fail-closed: crates.io verifies the .crate checksum against
        # the registry index, and a failed install now aborts (no `|| true`).
        run: cargo install --locked --version 1.1.0 cargo-criterion

      - name: Download baseline benchmarks
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: target/criterion
          key: benchmark-baseline-${{ github.base_ref || 'main' }}
          restore-keys: |
            benchmark-baseline-

      - name: Run benchmarks
        run: |
          if [ -d "benches" ]; then
            cargo bench --bench '*' -- --save-baseline current
          else
            echo "No benchmarks directory found. Create benches/ with criterion benchmarks."
            mkdir -p target/criterion
            echo "No benchmarks configured" > target/criterion/NOBENCH
          fi

      - name: Compare with baseline
        id: compare
        if: github.event_name == 'pull_request'
        run: |
          # shellcheck disable=SC2086
          if [ -f "target/criterion/NOBENCH" ]; then
            echo "regression=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check if baseline exists
          if [ -d "target/criterion/baseline" ]; then
            # Generate comparison report
            cargo bench --bench '*' -- --baseline baseline --save-baseline current > bench-output.txt 2>&1 || true

            # Parse for regressions (>5% slower)
            if grep -q "Performance has regressed" bench-output.txt || grep -q "Change within noise threshold" bench-output.txt; then
              echo "regression=false" >> "$GITHUB_OUTPUT"
            else
              echo "regression=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No baseline found - establishing baseline"
            echo "regression=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate benchmark report
        run: |
          # shellcheck disable=SC2129
          {
            echo "# Benchmark Results"
            echo ""
            if [ -f "target/criterion/NOBENCH" ]; then
              echo "No benchmarks configured. Add benchmarks to benches/ directory."
            elif [ -f "bench-output.txt" ]; then
              echo "## Performance Summary"
              echo ""
              echo '```'
              tail -n 50 bench-output.txt
              echo '```'
            else
              echo "Benchmarks executed successfully."
            fi
            echo ""
            echo "Full results available in CI artifacts."
          } > benchmark-report.md

      - name: Upload benchmark results
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: benchmark-results
          path: |
            benchmark-report.md
            target/criterion/
            bench-output.txt
          retention-days: 90

      - name: Save baseline for main branch
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          if [ -d "target/criterion" ] && [ ! -f "target/criterion/NOBENCH" ]; then
            cp -r target/criterion/current target/criterion/baseline
          fi

      - name: Store updated baseline
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: target/criterion
          key: benchmark-baseline-${{ github.ref_name }}-${{ github.sha }}
