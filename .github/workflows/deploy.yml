---
name: Deploy to GitHub Pages

# Modeled on modeled-information-format/MIF's and mif-docs-plugin's deploy.yml
# (the pattern that actually deploys under the org Actions allow-list).
# withastro/action is rejected here because it nests pnpm/action-setup, which
# is not allow-listed; this uses only GitHub-owned + allow-listed actions
# (setup-node, dtolnay/rust-toolchain — already used by this repo's own
# ci-checks.yml), all SHA-pinned. Builds rustdoc first, then the Astro site,
# then copies rustdoc into the site's dist/ so one Pages deployment serves both.

"on":
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Rust toolchain
        # master
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable

      - name: Cache cargo registry
        # v5.0.3
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-doc-${{ hashFiles('**/Cargo.lock') }}

      - name: Build rustdoc
        run: cargo doc --workspace --no-deps --all-features

      - name: Setup Node
        # v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: site/package-lock.json

      # The Astro site lives in site/ (its own package.json + node_modules) so
      # it does not collide with the workspace's own Rust tooling.
      - name: Install site dependencies
        run: npm ci
        working-directory: site

      - name: Build site
        run: npm run build
        working-directory: site

      - name: Copy rustdoc into the site build output
        run: |
          mkdir -p site/dist/rustdoc
          cp -r target/doc/. site/dist/rustdoc/

      - name: Configure Pages
        # v6.0.0
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d

      - name: Upload Pages artifact
        # v5.0.0
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: ./site/dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        name: Deploy to GitHub Pages
        # v5
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
