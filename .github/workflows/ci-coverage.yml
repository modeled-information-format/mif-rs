---
name: Code Coverage

"on":
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: false
  workflow_dispatch:

permissions:
  contents: read

jobs:
  coverage:
    name: Generate Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Rust toolchain
        # master
        uses: >-
          dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        # v2.67.25
        uses: >-
          taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853
        with:
          tool: cargo-llvm-cov@0.6.14

      - name: Cache cargo registry
        # v5.0.3
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: >-
            ${{ runner.os }}-cargo-cov-${{
            hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-cov-

      - name: Generate coverage
        run: |
          cargo llvm-cov --all-features --workspace \
            --lcov --output-path lcov.info
          cargo llvm-cov --all-features --workspace \
            --html --output-dir coverage-html
          cargo llvm-cov --all-features --workspace \
            --json --output-path coverage.json

      - name: Parse coverage percentage
        id: coverage
        run: |
          # Parse the JSON report generated above; the summary-table
          # TOTAL row puts an integer region count first, so a
          # 'TOTAL <float>%' grep never matches and reported 0%.
          COVERAGE=$(jq -r \
            '.data[0].totals.lines.percent * 100 | round / 100' \
            coverage.json || echo "0")
          echo "percentage=$COVERAGE" >> "$GITHUB_OUTPUT"
          echo "Coverage: ${COVERAGE}%"

      - name: Generate coverage report
        env:
          COVERAGE_PCT: ${{ steps.coverage.outputs.percentage }}
        run: |
          {
            echo "# Code Coverage Report"
            echo ""
            echo "**Overall Coverage:** ${COVERAGE_PCT}%"
            echo ""
            echo "## Summary"
            echo ""
            echo "\`\`\`"
            cargo llvm-cov --all-features \
              --workspace --summary-only
            echo "\`\`\`"
            echo ""
            echo "Full HTML report available in CI artifacts."
          } > coverage-report.md

      - name: Upload coverage to Codecov
        # v5.5.2
        uses: >-
          codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
        with:
          files: lcov.info
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifacts
        # v4.6.2
        uses: >-
          actions/upload-artifact@47309c993abb98030a35d55ef7ff34b7fa1074b5
        with:
          name: coverage-report
          path: |
            coverage-report.md
            coverage-html/
            lcov.info
            coverage.json
          retention-days: 30

      - name: Check coverage threshold
        env:
          COVERAGE: ${{ steps.coverage.outputs.percentage }}
        run: |
          THRESHOLD=90

          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) ))
          then
            echo "Coverage ${COVERAGE}% is below ${THRESHOLD}% — failing CI."
            exit 1
          else
            echo "Coverage ${COVERAGE}% meets ${THRESHOLD}%"
          fi
