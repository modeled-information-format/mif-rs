---
name: CI Checks

"on":
  workflow_call:
    inputs:
      rust-version:
        description: "Rust toolchain version"
        type: string
        default: "stable"
      msrv:
        description: "Minimum supported Rust version"
        type: string
        default: "1.95"
    secrets:
      CODECOV_TOKEN:
        required: false
  workflow_dispatch:
    inputs:
      rust-version:
        description: "Rust toolchain version"
        type: string
        default: "stable"
      msrv:
        description: "Minimum supported Rust version"
        type: string
        default: "1.95"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Rust toolchain
        # master
        uses: >-
          dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: ${{ inputs.rust-version }}
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Rust toolchain
        # master
        uses: >-
          dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: ${{ inputs.rust-version }}
          components: clippy

      - name: Cache cargo registry
        # v5.0.3
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: >-
            ${{ runner.os }}-cargo-clippy-${{
            hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-

      - name: Run clippy
        run: >-
          cargo clippy --workspace --all-targets --all-features
          -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout repository
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Rust toolchain
        # master
        uses: >-
          dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: ${{ inputs.rust-version }}

      - name: Cache cargo registry
        # v5.0.3
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: >-
            ${{ runner.os }}-cargo-test-${{
            hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Run tests
        run: cargo test --workspace --all-features --verbose

  parity:
    name: RHT Parity (fail-closed)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Checkout research-harness-template (pinned)
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: modeled-information-format/research-harness-template
          # Pinned rht commit the parity suite runs against. Bump by PR
          # (take the current SHA of research-harness-template@main); the
          # checkout must contain evals/fixtures/ontology/ and
          # evals/fixtures/search/known-similar-pairs.json.
          ref: 7e2d821ef0437ad242ced2deeae772e644ff06c3
          path: rht

      - name: Checkout ontologies registry (pinned)
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: modeled-information-format/ontologies
          # The rht fixture catalog references one pack rht VENDORS rather
          # than commits (packs/ontologies/..., per rht's ADR-0012), so a
          # fresh rht checkout lacks it. The canonical copy lives in the
          # ontologies registry; the step below vendors it byte-identically.
          # Bump alongside the rht pin above.
          ref: c1fcb8683293a903c38678633fd8fd113a812c22
          path: ontologies-registry

      - name: Vendor the fixture-referenced ontology pack into rht
        run: |
          mkdir -p rht/packs/ontologies/software-engineering
          cp ontologies-registry/ontologies/software-engineering.ontology.yaml \
            rht/packs/ontologies/software-engineering/software-engineering.ontology.yaml

      - name: Install Rust toolchain
        # master
        uses: >-
          dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: ${{ inputs.rust-version }}

      - name: Cache cargo registry
        # v5.0.3
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: >-
            ${{ runner.os }}-cargo-parity-${{
            hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-parity-

      - name: Cache the sentence-transformers model
        # v5.0.3 — the search eval embeds real text; the model is a
        # first-run network fetch (~90 MB) cached across runs. The key is
        # static because mif-embed pins one model (mif_embed::MODEL_ID),
        # and the path is mif-embed's own hf-hub cache dir
        # (dirs::cache_dir()/mif/models), NOT the default ~/.cache/huggingface.
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ~/.cache/mif/models
          key: hf-all-MiniLM-L6-v2

      - name: Run parity tests (fixtures required, fail-closed)
        env:
          MIF_RH_PARITY_FIXTURES_ROOT: ${{ github.workspace }}/rht
          MIF_RH_PARITY_REQUIRED: "1"
          MIF_RH_SEARCH_EVAL_REQUIRED: "1"
        run: |
          cargo test -p mif-rh --test parity --all-features -- --nocapture
          cargo test -p mif-rh-cli --test bin_parity --all-features -- --nocapture
          cargo test -p mif-rh --test search_eval --all-features -- --nocapture

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - name: Checkout repository
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Rust toolchain
        # master
        uses: >-
          dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: ${{ inputs.rust-version }}

      - name: Cache cargo registry
        # v5.0.3
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: >-
            ${{ runner.os }}-cargo-doc-${{
            hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-doc-

      - name: Check documentation
        run: cargo doc --workspace --no-deps --all-features

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install cargo-deny
        # v2.67.25
        uses: >-
          taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9
        with:
          tool: cargo-deny

      - name: Run cargo-deny
        run: cargo deny check

  msrv:
    name: MSRV Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Rust toolchain
        # master
        uses: >-
          dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: "${{ inputs.msrv }}"

      - name: Cache cargo registry
        # v5.0.3
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: >-
            ${{ runner.os }}-cargo-msrv-${{
            hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-msrv-

      - name: Check MSRV
        run: cargo check --workspace --all-features

  all-checks-pass:
    name: All Checks Pass
    if: always()
    needs: [fmt, clippy, test, parity, doc, deny, msrv]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        env:
          FMT_RESULT: ${{ needs.fmt.result }}
          CLIPPY_RESULT: ${{ needs.clippy.result }}
          TEST_RESULT: ${{ needs.test.result }}
          PARITY_RESULT: ${{ needs.parity.result }}
          DOC_RESULT: ${{ needs.doc.result }}
          DENY_RESULT: ${{ needs.deny.result }}
          MSRV_RESULT: ${{ needs.msrv.result }}
        run: |
          if [[ "$FMT_RESULT" != "success" ]] || \
             [[ "$CLIPPY_RESULT" != "success" ]] || \
             [[ "$TEST_RESULT" != "success" ]] || \
             [[ "$PARITY_RESULT" != "success" ]] || \
             [[ "$DOC_RESULT" != "success" ]] || \
             [[ "$DENY_RESULT" != "success" ]] || \
             [[ "$MSRV_RESULT" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All checks passed!"
