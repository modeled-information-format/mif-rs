---
name: Admin — Delete Orphaned GHCR Packages

# One-off admin action, not part of the release pipeline. mif-cli/mif-mcp
# packages remained tied to the old (renamed, archived) fork's repo ID after
# the fork was detached and a fresh non-fork repo took over the mif-rs name -
# the new repo's Docker job 403s pushing to a package path GHCR still
# attributes to the archived repo. Deleting the orphaned packages here frees
# the namespace so the new repo's next push creates them fresh.

"on":
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  delete-packages:
    name: Delete Orphaned Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Mint release app token
        id: app-token
        # v3.2.0
        uses: >-
          actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          client-id: ${{ vars.RELEASE_CLIENT_APP_ID }}
          private-key: ${{ secrets.RELEASE_CLIENT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: mif-rs,mif-rs-fork-archive

      - name: Delete mif-cli and mif-mcp packages
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          for bin in mif-cli mif-mcp; do
            echo "Deleting ghcr.io/${{ github.repository_owner }}/mif-rs/${bin}..."
            gh api -X DELETE \
              "orgs/${{ github.repository_owner }}/packages/container/mif-rs%2F${bin}" \
              || echo "not found or already deleted, continuing"
          done
