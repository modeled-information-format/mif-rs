---
name: Security Audit

"on":
  schedule:
    # Run daily at 00:00 UTC
    - cron: "0 0 * * *"
  push:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Rust toolchain
        # master
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable

      - name: Install cargo-audit
        # v2.67.18
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9
        with:
          tool: cargo-audit

      - name: Run security audit
        # RUSTSEC-2024-0436 (unmaintained `paste`, transitive via candle-core
        # -> gemm, no upgrade path) is ignored the same as in deny.toml.
        # cargo-audit 0.22.x has no config-file auto-discovery (verified
        # empirically); --ignore is the only supported suppression mechanism.
        run: cargo audit --deny warnings --ignore RUSTSEC-2024-0436
