---
name: Deploy Documentation

# Builds and validates the docs site (rustdoc + Astro) on every relevant change
# so breakage is caught early. Publishing to GitHub Pages is OPT-IN and dormant
# in the template: enable Pages (Settings -> Pages -> "GitHub Actions") and set
# the repo variable DEPLOY_DOCS=true to deploy. See the Setup Pages step below.

"on":
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'site/**'
      - 'CLAUDE.md'
      - 'Cargo.toml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Rust
        # yamllint disable-line rule:line-length
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88  # master
        with:
          toolchain: stable

      - name: Build rustdoc
        run: cargo doc --no-deps --all-features

      - name: Setup Node.js
        # yamllint disable-line rule:line-length
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'

      - name: Install site dependencies
        working-directory: site
        # `npm ci` installs strictly from the committed package-lock.json
        # (pinned, reproducible). The `|| npm install` fallback allowed an
        # unpinned resolution (Scorecard: Pinned-Dependencies); the lockfile
        # is committed, so `npm ci` is the correct, reproducible path.
        run: npm ci

      - name: Generate content
        working-directory: site
        run: npm run generate

      - name: Build Astro site
        working-directory: site
        # site + base come from astro.config.mjs. Do not pass --site here:
        # overriding it with a path segment double-counts against `base` and
        # breaks asset URLs.
        run: npx astro build

      - name: Embed rustdoc
        run: |
          mkdir -p site/dist/api
          cp -r target/doc/* site/dist/api/
          REDIR='<meta http-equiv="refresh"'
          REDIR="$REDIR"' content="0; url=rust_template">'
          echo "$REDIR" > site/dist/api/index.html

      # Pages deploy is OPT-IN. The template builds and validates the docs on
      # every change (above), but does not publish by default: a fresh template
      # has no GitHub Pages site, and this org does not allow the Actions token
      # to create one (configure-pages enablement fails "Resource not accessible
      # by integration"). To publish, enable Pages (Settings -> Pages ->
      # "GitHub Actions") and set the repo variable DEPLOY_DOCS=true.
      - name: Setup Pages
        if: vars.DEPLOY_DOCS == 'true'
        # yamllint disable-line rule:line-length
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0

      - name: Upload artifact
        if: vars.DEPLOY_DOCS == 'true'
        # yamllint disable-line rule:line-length
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: site/dist

  deploy:
    name: Deploy to GitHub Pages
    if: vars.DEPLOY_DOCS == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-docs

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        # yamllint disable-line rule:line-length
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
