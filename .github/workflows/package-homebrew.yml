---
name: Homebrew Package

# Updates the source formula in <owner>/homebrew-tap (override the tap
# repo name with the HOMEBREW_TAP_REPO repository variable).
#
# All project specificity (binary name, description, license) is resolved
# from Cargo.toml at the released tag — nothing to rename in this file
# when the template is instantiated.

"on":
  # workflow_run is the reliable trigger: releases are authored by
  # github-actions[bot] (HOMEBREW_TAP_TOKEN is scoped to the tap repo
  # only), and bot-authored release events do not trigger workflows.
  workflow_run:
    workflows: [Release]
    types: [completed]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to package"
        required: true
      dry_run:
        description: "Dry run (do not push)"
        type: boolean
        default: true

# The tap push uses HOMEBREW_TAP_TOKEN (a PAT), not GITHUB_TOKEN —
# this workflow only ever reads the source repository.
permissions:
  contents: read

jobs:
  homebrew:
    name: Update Homebrew Formula
    runs-on: macos-latest
    environment: copilot
    # workflow_run fires for every Release completion, including branch
    # dry-runs — only proceed for successful tag runs (head_branch is the
    # tag name for tag-triggered runs).
    if: >-
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))

    steps:
      - name: Get release info
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RUN_TAG: ${{ github.event.workflow_run.head_branch }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            VERSION="$RELEASE_TAG"
            VERSION="${VERSION#v}"
          elif [ "$EVENT_NAME" = "workflow_run" ]; then
            VERSION="${RUN_TAG#v}"
          else
            VERSION="${INPUT_VERSION#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Source tarball URL
          SRC_URL="https://github.com/${REPO}"
          SRC_URL="${SRC_URL}/archive/refs/tags"
          SRC_URL="${SRC_URL}/v${VERSION}.tar.gz"

          # Compute SHA256 — fail loudly on any download error so the
          # formula can never carry a hash of an error response.
          set -euo pipefail
          SRC_SHA=$(curl -fsSL "$SRC_URL" \
            | shasum -a 256 | awk '{print $1}')

          echo "src_url=$SRC_URL" >> "$GITHUB_OUTPUT"
          echo "src_sha=$SRC_SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout project at released tag
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: v${{ steps.release.outputs.version }}
          path: project

      - name: Install Rust toolchain
        # master
        uses: >-
          dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable

      - name: Resolve project metadata from Cargo.toml
        id: meta
        working-directory: project
        run: |
          set -euo pipefail
          META=$(cargo metadata --no-deps --locked --format-version 1)
          BIN=$(jq -r \
            '[.packages[0].targets[] | select(.kind | index("bin"))][0].name' \
            <<< "$META")
          DESC=$(jq -r '.packages[0].description // ""' <<< "$META")
          LICENSE=$(jq -r '.packages[0].license // "MIT"' <<< "$META")
          # `publish = false` in Cargo.toml AT THE RELEASED TAG (the
          # template's shipped state) disables the tap update; delete
          # that line in a real project to arm this channel.
          PUBLISHABLE=$(jq -r \
            'if .packages[0].publish == [] then "false" else "true" end' \
            <<< "$META")
          # Formula file name: kebab-case of the binary name.
          FORMULA=$(echo "$BIN" | tr '_' '-')
          # Ruby class name: CamelCase of the formula name.
          CLASS=$(echo "$FORMULA" | awk -F'-' \
            '{for (i=1; i<=NF; i++) \
              printf "%s%s", toupper(substr($i,1,1)), substr($i,2)}')
          {
            echo "bin=${BIN}"
            echo "desc=${DESC}"
            echo "license=${LICENSE}"
            echo "formula=${FORMULA}"
            echo "class=${CLASS}"
            echo "publishable=${PUBLISHABLE}"
          } >> "$GITHUB_OUTPUT"
          echo "publishable: ${PUBLISHABLE}"

      # Dry-runs never touch the tap repo, so previewing a formula
      # requires neither HOMEBREW_TAP_TOKEN nor an existing tap.
      - name: Checkout homebrew tap
        if: >-
          steps.meta.outputs.publishable == 'true'
          && github.event.inputs.dry_run != 'true'
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: >-
            ${{ github.repository_owner }}/${{
            vars.HOMEBREW_TAP_REPO || 'homebrew-tap' }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Generate source formula
        if: steps.meta.outputs.publishable == 'true'
        env:
          VERSION: ${{ steps.release.outputs.version }}
          REPO: ${{ github.repository }}
          SRC_URL: ${{ steps.release.outputs.src_url }}
          SRC_SHA: ${{ steps.release.outputs.src_sha }}
          BIN: ${{ steps.meta.outputs.bin }}
          DESC: ${{ steps.meta.outputs.desc }}
          LICENSE: ${{ steps.meta.outputs.license }}
          FORMULA: ${{ steps.meta.outputs.formula }}
          CLASS: ${{ steps.meta.outputs.class }}
        run: |
          mkdir -p formula-out
          cat > "formula-out/${FORMULA}.rb" << FORMULA_EOF
          class ${CLASS} < Formula
            desc "${DESC}"
            homepage "https://github.com/${REPO}"
            url "${SRC_URL}"
            sha256 "${SRC_SHA}"
            version "${VERSION}"
            license "${LICENSE}"
            head "https://github.com/${REPO}.git", branch: "main"

            depends_on "rust" => :build

            def install
              system "cargo", "install", *std_cargo_args
            end

            test do
              assert_match version.to_s,
                shell_output("#{bin}/${BIN} --version")
            end
          end
          FORMULA_EOF

      - name: Commit and push formula
        if: >-
          steps.meta.outputs.publishable == 'true'
          && github.event.inputs.dry_run != 'true'
        env:
          VERSION: ${{ steps.release.outputs.version }}
          FORMULA: ${{ steps.meta.outputs.formula }}
        run: |
          mkdir -p homebrew-tap/Formula
          cp "formula-out/${FORMULA}.rb" "homebrew-tap/Formula/"
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email \
            "github-actions[bot]@users.noreply.github.com"

          git add "Formula/${FORMULA}.rb"
          # Idempotent: with both workflow_run and release triggers wired,
          # a second firing for the same version must be a no-op.
          if git diff --staged --quiet; then
            echo "Formula already up to date for ${VERSION}; nothing to push"
          else
            git commit -m "${FORMULA}: update to ${VERSION}"
            git push
          fi

      - name: Show formula (dry run)
        if: >-
          steps.meta.outputs.publishable == 'true'
          && github.event.inputs.dry_run == 'true'
        env:
          FORMULA: ${{ steps.meta.outputs.formula }}
        run: |
          echo "=== ${FORMULA}.rb (source) ==="
          cat "formula-out/${FORMULA}.rb"
