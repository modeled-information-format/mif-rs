---
name: Publish to crates.io

# crates.io Trusted Publishing (OIDC) — no long-lived registry token —
# followed by attestation of the bytes the registry actually serves.
#
# One-time setup per crate: crates.io -> crate Settings -> Trusted
# Publishing -> add this GitHub repo, workflow `publish.yml`,
# environment `copilot`.
#
# The crate name is resolved at runtime from Cargo.toml — nothing to
# rename in this file when the template is instantiated.

"on":
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # `publish = false` in Cargo.toml (the template's shipped state)
  # disables this entire workflow; delete that line in a real project
  # to arm crates.io publishing.
  guard:
    name: Publish Gate
    runs-on: ubuntu-latest
    outputs:
      publishable: ${{ steps.gate.outputs.publishable }}
    steps:
      - name: Checkout repository
        # v6.0.3
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Install Rust toolchain
        # master
        uses: >-
          dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537
        with:
          toolchain: stable

      - name: Read package.publish from Cargo.toml
        id: gate
        run: |
          PUBLISHABLE=$(cargo metadata --no-deps --locked --format-version 1 \
            | jq -r \
            'if .packages[0].publish == [] then "false" else "true" end')
          echo "publishable=${PUBLISHABLE}" >> "$GITHUB_OUTPUT"
          echo "publishable: ${PUBLISHABLE}"

  publish:
    name: Publish to crates.io
    needs: [guard]
    if: needs.guard.outputs.publishable == 'true'
    runs-on: ubuntu-latest
    environment: copilot
    permissions:
      contents: read
      # OIDC for crates.io Trusted Publishing and .crate attestation signing
      id-token: write
      # Provenance attestation for the published .crate
      attestations: write
    steps:
      - name: Checkout repository
        # v6.0.3
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Install Rust toolchain
        # master
        uses: >-
          dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537
        with:
          toolchain: stable

      - name: Install cargo-deny
        # v2.67.25
        uses: >-
          taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9
        with:
          tool: cargo-deny

      - name: Resolve crate name
        id: crate-meta
        run: |
          NAME=$(cargo metadata --no-deps --locked --format-version 1 \
            | jq -r '.packages[0].name')
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      # cargo publish ships the Cargo.toml version regardless of the tag;
      # publishing is irreversible, so a mismatch must fail before publish.
      - name: Assert tag version matches Cargo.toml
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(cargo metadata --no-deps --locked --format-version 1 \
            | jq -r '.packages[0].version')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::tag v${TAG_VERSION} does not match" \
              "Cargo.toml version ${CARGO_VERSION}"
            exit 1
          fi

      - name: Verify package
        run: |
          cargo package --list
          cargo package --allow-dirty

      - name: Run pre-publish checks
        run: |
          cargo fmt -- --check
          cargo clippy --all-targets --all-features --locked -- -D warnings
          cargo test --all-features --locked
          cargo doc --no-deps --all-features --locked
          cargo deny check

      - name: Dry run publish
        run: cargo publish --dry-run --allow-dirty

      # Trusted Publishing (OIDC): no long-lived registry token.
      - name: Authenticate with crates.io
        id: auth
        if: startsWith(github.ref, 'refs/tags/v')
        # v1.0.4
        uses: >-
          rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18

      - name: Publish to crates.io
        if: startsWith(github.ref, 'refs/tags/v')
        run: cargo publish --token "$CARGO_REGISTRY_TOKEN"
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      # Attest the bytes the registry actually serves, not a local rebuild:
      # download the published .crate, assert it matches what cargo packaged
      # locally (cargo packaging is deterministic for a given commit — a
      # mismatch means something is wrong and must fail loudly), then attach
      # SLSA provenance to it.
      - name: Download published crate from registry
        id: crate
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          NAME: ${{ steps.crate-meta.outputs.name }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          CRATE="${NAME}-${VERSION}.crate"
          URL="https://static.crates.io/crates/${NAME}/${CRATE}"
          downloaded=0
          # static.crates.io can reject requests without a User-Agent
          for attempt in 1 2 3 4 5 6; do
            if curl -fsSL -A "${NAME}-release-check" \
              -o "${CRATE}" "$URL"; then
              downloaded=1
              break
            fi
            echo "crate not yet on CDN (attempt ${attempt}); retrying"
            sleep 10
          done
          if [ "$downloaded" -ne 1 ] || [ ! -s "${CRATE}" ]; then
            echo "::error::failed to download ${URL} after 6 attempts"
            exit 1
          fi
          LOCAL="target/package/${CRATE}"
          if [ ! -f "$LOCAL" ]; then
            echo "::error::locally packaged crate missing: ${LOCAL}"
            exit 1
          fi
          sha_remote=$(sha256sum "${CRATE}" | cut -d' ' -f1)
          sha_local=$(sha256sum "$LOCAL" | cut -d' ' -f1)
          if [ "$sha_remote" != "$sha_local" ]; then
            echo "::error::registry crate bytes differ from local package"
            exit 1
          fi
          echo "crate-path=${CRATE}" >> "$GITHUB_OUTPUT"

      - name: Attest crate provenance
        if: startsWith(github.ref, 'refs/tags/v')
        # v4.1.0
        uses: >-
          actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: ${{ steps.crate.outputs.crate-path }}
