---
name: Publish to crates.io

# crates.io Trusted Publishing (OIDC) — no long-lived registry token —
# followed by attestation of the bytes the registry actually serves.
#
# One-time setup per crate: crates.io -> crate Settings -> Trusted
# Publishing -> add this GitHub repo, workflow `publish.yml`,
# environment `release`. This workspace publishes 9 crates independently
# (mif-core, mif-problem, mif-schema, mif-frontmatter, mif-ontology,
# mif-embed, mif-store, mif-cli, mif-mcp) — repeat the Trusted Publishing
# linkage once per crate.

"on":
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # A workspace member with `publish = false` is excluded from
  # `cargo publish --workspace`; a member with no `publish` line, or
  # `publish = true`, is included. This gate looks at every member, not
  # just .packages[0] — every workspace member (mif-core, mif-problem,
  # mif-schema, mif-frontmatter, mif-ontology, mif-embed, mif-store,
  # mif-cli, mif-mcp) is armed independently (see Cargo.toml's per-crate
  # `publish` line).
  guard:
    name: Publish Gate
    runs-on: ubuntu-latest
    outputs:
      publishable: ${{ steps.gate.outputs.publishable }}
      publishable-names: ${{ steps.gate.outputs.publishable-names }}
    steps:
      - name: Checkout repository
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Rust toolchain
        # master
        uses: >-
          dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable

      - name: Read package.publish from cargo metadata
        id: gate
        run: |
          set -euo pipefail
          META=$(cargo metadata --no-deps --locked --format-version 1)
          NAMES=$(jq -c '[.packages[] | select(.publish != []) | .name]' <<< "$META")
          PUBLISHABLE=$(jq -r 'length > 0' <<< "$NAMES")
          echo "publishable=${PUBLISHABLE}" >> "$GITHUB_OUTPUT"
          echo "publishable-names=${NAMES}" >> "$GITHUB_OUTPUT"
          echo "publishable: ${PUBLISHABLE} (${NAMES})"

  publish:
    name: Publish to crates.io
    needs: [guard]
    if: needs.guard.outputs.publishable == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      # OIDC for crates.io Trusted Publishing and .crate attestation signing
      id-token: write
      # Provenance attestation for the published .crate
      attestations: write
    steps:
      - name: Checkout repository
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Rust toolchain
        # master
        uses: >-
          dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable

      - name: Install cargo-deny
        # v2.67.25
        uses: >-
          taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419
        with:
          tool: cargo-deny

      # cargo publish ships the Cargo.toml version regardless of the tag;
      # publishing is irreversible, so a mismatch must fail before publish.
      # Every workspace member shares `version.workspace = true`, so reading
      # .packages[0].version is safe here specifically — unlike `.publish`
      # or bin/crate names, which differ per-crate and must never be read
      # positionally.
      - name: Assert tag version matches Cargo.toml
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(cargo metadata --no-deps --locked --format-version 1 \
            | jq -r '.packages[0].version')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::tag v${TAG_VERSION} does not match" \
              "Cargo.toml version ${CARGO_VERSION}"
            exit 1
          fi

      - name: List package contents
        run: cargo package --workspace --list --allow-dirty

      - name: Run pre-publish checks
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          cargo test --workspace --all-features --locked
          cargo doc --workspace --no-deps --all-features --locked
          cargo deny check

      # This IS the packaging verification for an interdependent workspace,
      # not just a publish rehearsal: a bare `cargo package --workspace`
      # (without going through `cargo publish --workspace`) fails outright
      # here — mif-schema depends on mif-core by path, and cargo package's
      # own verification step re-resolves dependencies against the REAL
      # crates.io index, where mif-core doesn't exist yet before its first
      # publish. `cargo publish --workspace --dry-run` doesn't have that
      # problem — confirmed empirically — because it stages each crate into
      # a local scratch registry as it goes, so mif-schema's dry-run
      # verification build resolves mif-core from that staged registry, the
      # same dependency-ordered flow the real publish uses.
      - name: Dry run publish
        run: cargo publish --workspace --dry-run --allow-dirty

      # Trusted Publishing (OIDC): no long-lived registry token. The token
      # exchange is workflow-scoped (this repo/workflow/environment), not
      # per-crate — crates.io authorizes each individual `cargo publish`
      # call against that crate's own Trusted Publishing linkage, so one
      # exchange covers every crate `cargo publish --workspace` touches.
      - name: Authenticate with crates.io
        id: auth
        if: startsWith(github.ref, 'refs/tags/v')
        # v1.0.4
        uses: >-
          rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18

      # cargo publish is documented non-atomic and re-publishing an
      # already-live exact version is documented to error — so a re-run
      # after a partial failure must not blow up on members that already
      # succeeded. Check each publishable member against the registry
      # first and only pass the not-yet-published ones to `cargo publish`.
      - name: Resolve unpublished members
        id: unpublished
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          NAMES: ${{ needs.guard.outputs.publishable-names }}
        run: |
          set -euo pipefail
          META=$(cargo metadata --no-deps --locked --format-version 1)
          ARGS=""
          ANY=false
          for name in $(jq -r '.[]' <<< "$NAMES"); do
            VERSION=$(jq -r --arg n "$name" \
              '.packages[] | select(.name == $n) | .version' <<< "$META")
            if curl -fsS -A "${name}-publish-check" \
              "https://crates.io/api/v1/crates/${name}/${VERSION}" \
              >/dev/null 2>&1; then
              echo "::notice::${name}@${VERSION} already on crates.io — skipping"
            else
              ARGS="${ARGS} -p ${name}"
              ANY=true
            fi
          done
          echo "args=${ARGS}" >> "$GITHUB_OUTPUT"
          echo "any=${ANY}" >> "$GITHUB_OUTPUT"
          echo "unpublished:${ARGS}"

      - name: Publish unpublished workspace members to crates.io
        if: >-
          startsWith(github.ref, 'refs/tags/v')
          && steps.unpublished.outputs.any == 'true'
        run: >-
          cargo publish --token "$CARGO_REGISTRY_TOKEN"
          ${{ steps.unpublished.outputs.args }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      # Produce the LOCAL comparison file the next step needs, now that
      # publish has actually happened. `cargo package` (unlike
      # `cargo publish --workspace --dry-run`, used only for pre-publish
      # verification above) writes its .crate directly to the documented,
      # stable `target/package/<name>-<version>.crate` path — but only
      # succeeds once a crate's path-dependencies are resolvable from the
      # real crates.io index, which for mif-schema/mif-ontology/mif-cli/
      # mif-mcp is only true AFTER their siblings just got published above
      # (confirmed empirically: this same command fails with "no matching
      # package named mif-core found" if run before mif-core is live).
      #
      # Retries the whole REMAINING set each pass, not one crate at a time —
      # `cargo metadata`'s .packages[] order is not a documented topological
      # guarantee (unlike `cargo publish -p a -p b`, which cargo internally
      # reorders by dependency graph regardless of -p argument order). A
      # per-crate-only retry could exhaust its budget on a dependent while
      # its not-yet-attempted dependency sits later in the list; retrying
      # the remaining set each pass makes forward progress regardless of
      # initial ordering — every crate here is at most 2 dependency levels
      # deep (mif-core -> mif-schema/mif-ontology -> mif-cli/mif-mcp), so 6
      # passes comfortably covers any ordering plus index-propagation lag.
      - name: Package published crates for byte comparison
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          NAMES: ${{ needs.guard.outputs.publishable-names }}
        run: |
          set -euo pipefail
          # Newline-delimited string, not a bash array: an empty array
          # expanded via "${arr[@]}" trips `set -u`'s unbound-variable
          # check in this exact "declared but nothing ever appended" shape
          # (confirmed empirically) — a plain string sidesteps it entirely.
          remaining=$(jq -r '.[]' <<< "$NAMES")
          for pass in 1 2 3 4 5 6; do
            next_remaining=""
            while IFS= read -r name; do
              [ -z "$name" ] && continue
              if cargo package -p "$name" --allow-dirty; then
                echo "packaged ${name}"
              else
                echo "not yet packageable: ${name} (pass ${pass})"
                next_remaining="${next_remaining}${name}"$'\n'
              fi
            done <<< "$remaining"
            remaining="$next_remaining"
            if [ -z "$(tr -d '[:space:]' <<< "$remaining")" ]; then
              break
            fi
            sleep 10
          done
          if [ -n "$(tr -d '[:space:]' <<< "$remaining")" ]; then
            echo "::error::failed to package after 6 passes: $(tr '\n' ' ' <<< "$remaining")"
            exit 1
          fi

      # Attest the bytes the registry actually serves, not a local rebuild:
      # download every publishable crate's published .crate, assert each
      # matches what cargo packaged locally (cargo packaging is
      # deterministic for a given commit — a mismatch means something is
      # wrong and must fail loudly), then attach SLSA provenance to all of
      # them in one call (subject-path accepts a glob).
      - name: Download published crates from registry
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          NAMES: ${{ needs.guard.outputs.publishable-names }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/v}"
          mkdir -p crates-out
          for name in $(jq -r '.[]' <<< "$NAMES"); do
            CRATE="${name}-${VERSION}.crate"
            URL="https://static.crates.io/crates/${name}/${CRATE}"
            downloaded=0
            # static.crates.io can reject requests without a User-Agent
            for attempt in 1 2 3 4 5 6; do
              if curl -fsSL -A "${name}-release-check" \
                -o "crates-out/${CRATE}" "$URL"; then
                downloaded=1
                break
              fi
              echo "crate not yet on CDN (attempt ${attempt}); retrying"
              sleep 10
            done
            if [ "$downloaded" -ne 1 ] || [ ! -s "crates-out/${CRATE}" ]; then
              echo "::error::failed to download ${URL} after 6 attempts"
              exit 1
            fi
            LOCAL="target/package/${CRATE}"
            if [ ! -f "$LOCAL" ]; then
              echo "::error::locally packaged crate missing: ${LOCAL}"
              exit 1
            fi
            sha_remote=$(sha256sum "crates-out/${CRATE}" | cut -d' ' -f1)
            sha_local=$(sha256sum "$LOCAL" | cut -d' ' -f1)
            if [ "$sha_remote" != "$sha_local" ]; then
              echo "::error::registry crate bytes differ from local package for ${name}"
              exit 1
            fi
          done

      - name: Attest crate provenance
        if: startsWith(github.ref, 'refs/tags/v')
        # v4.1.0
        uses: >-
          actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: crates-out/*
