---
name: ADR Validation

"on":
  pull_request:
    paths:
      - 'docs/adr/**'
  push:
    branches: [main, master]
    paths:
      - 'docs/adr/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate ADRs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Validate ADR Format
        # main
        uses: modeled-information-format/adrscope@e6384bf222c179d4083e1003b17154e48fc0f914
        with:
          command: validate
          adr-path: docs/adr

      - name: Get ADR Statistics
        # main
        uses: modeled-information-format/adrscope@e6384bf222c179d4083e1003b17154e48fc0f914
        with:
          command: stats
          adr-path: docs/adr

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        # v9.0.0
        uses: >-
          actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const fs = require('fs');
            const statsFile = 'adr-stats.json';

            if (!fs.existsSync(statsFile)) {
              console.log('No stats file generated');
              return;
            }

            const stats = JSON.parse(fs.readFileSync(statsFile, 'utf8'));

            const comment = `## ADR Validation Results

            📊 **Statistics:**
            - Total ADRs: ${stats.total || 0}
            - Accepted: ${stats.accepted || 0}
            - Proposed: ${stats.proposed || 0}
            - Deprecated: ${stats.deprecated || 0}
            - Superseded: ${stats.superseded || 0}

            ✅ All ADRs validated successfully!`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
