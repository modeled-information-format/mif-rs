---
name: Release

# Attested delivery: build platform binaries, attach SLSA build provenance
# to each, generate + attest a CycloneDX SBOM, attest the SAST + SCA +
# IaC/license quality-gate verdicts over a published source snapshot, then
# fail-closed verify every attestation BEFORE the GitHub Release is published.
# A tag publishes nothing unattested. (Supply-chain posture (Scorecard) is a
# repo-level signal in quality-gates.yml, not an artifact verdict.)
#
# Project specificity is resolved at runtime from Cargo.toml (crate name,
# binary name, version) and the GitHub context (owner/repo) — there is
# nothing to rename in this file when the template is instantiated.
#
# Dry-run: `workflow_dispatch` from any branch rehearses the non-publishing
# pipeline — build, test, audit, SBOM generation, source-pack, and the
# quality-gate scans (`gate-sast`/`gate-sca`/`gate-trivy`). The signing,
# attestation, `verify`, and release-publish jobs (`attest-*`/`vex`/`verify`/
# `release`) are tag-gated (`refs/tags/*`), so a dry-run mints no signed
# attestation and cuts no GitHub Release — nothing persistent or publicly
# verifiable enters the attestation store. (It still produces ephemeral,
# run-scoped Actions artifacts and code-scanning SARIF, as any CI run does.)
# This keeps the build byte-reproducible without a dry-run's `-dev` artifacts
# minting attestations that collide (same digest) with a later tagged release.

"on":
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  meta:
    name: Resolve Project Metadata
    runs-on: ubuntu-latest
    outputs:
      bins: ${{ steps.meta.outputs.bins }}
      bin-count: ${{ steps.meta.outputs.bin-count }}
      version: ${{ steps.meta.outputs.version }}
      publishable: ${{ steps.meta.outputs.publishable }}
    steps:
      - name: Checkout repository
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Rust toolchain
        # master
        uses: >-
          dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable

      - name: Resolve binary names and version from cargo metadata
        id: meta
        run: |
          set -euo pipefail
          META=$(cargo metadata --no-deps --locked --format-version 1)
          # Every [[bin]] target across the workspace, not just .packages[0] —
          # this repo builds mif-cli and mif-mcp, and dynamic resolution means
          # a future third binary crate needs zero workflow changes.
          BINS=$(jq -c \
            '[.packages[].targets[] | select(.kind | index("bin")) | .name] | unique' \
            <<< "$META")
          BIN_COUNT=$(jq -r 'length' <<< "$BINS")
          if [ "$BIN_COUNT" -eq 0 ]; then
            echo "::error::no [[bin]] target found in the workspace"
            exit 1
          fi
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            # Dry-run (workflow_dispatch): every member shares
            # version.workspace = true, so .packages[0].version is safe here
            # specifically (unlike .publish or bin targets, which differ
            # per-crate and must never be read positionally).
            VERSION="$(jq -r '.packages[0].version' <<< "$META")-dev"
          fi
          {
            echo "bins=${BINS}"
            echo "bin-count=${BIN_COUNT}"
            echo "version=${VERSION}"
          } >> "$GITHUB_OUTPUT"
          # Any workspace member with publish != false arms external
          # publication (crates.io / container / Homebrew); the
          # build->attest->verify chain still runs as CI validation either way.
          PUBLISHABLE=$(jq -r \
            '[.packages[] | select(.publish != [])] | length > 0' \
            <<< "$META")
          echo "publishable=${PUBLISHABLE}" >> "$GITHUB_OUTPUT"
          echo "Resolved: ${BINS} ${VERSION} (publishable: ${PUBLISHABLE})"

  build:
    name: Build (${{ matrix.bin }}, ${{ matrix.platform }})
    needs: [meta]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        # Cross product: every [[bin]] target x every platform. `include`
        # entries below match on `platform` and merge os/target/ext into
        # each (bin, platform) combination — see GitHub Actions' matrix
        # `include` semantics (extends existing combinations when the
        # include entry's key matches an existing matrix dimension).
        bin: ${{ fromJson(needs.meta.outputs.bins) }}
        platform:
          - linux-amd64
          - linux-arm64
          - macos-arm64
          - macos-amd64
          - windows-amd64
        include:
          - platform: linux-amd64
            os: ubuntu-latest
            ext: ""
          - platform: linux-arm64
            os: ubuntu-24.04-arm
            ext: ""
          - platform: macos-arm64
            os: macos-latest
            ext: ""
          - platform: macos-amd64
            os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
          - platform: windows-amd64
            os: windows-latest
            ext: ".exe"
    steps:
      - name: Checkout repository
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Rust toolchain
        # master
        uses: >-
          dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable
          targets: ${{ matrix.target || '' }}

      - name: Build release binary
        shell: bash
        env:
          BIN: ${{ matrix.bin }}
          TARGET: ${{ matrix.target || '' }}
        run: |
          if [ -n "$TARGET" ]; then
            cargo build --release --locked --target "$TARGET" -p "$BIN" --bin "$BIN"
          else
            cargo build --release --locked -p "$BIN" --bin "$BIN"
          fi

      - name: Stage named artifact
        shell: bash
        env:
          BIN: ${{ matrix.bin }}
          VERSION: ${{ needs.meta.outputs.version }}
          PLATFORM: ${{ matrix.platform }}
          TARGET: ${{ matrix.target || '' }}
          EXT: ${{ matrix.ext }}
        run: |
          mkdir -p dist
          SRC="target/release/${BIN}${EXT}"
          if [ -n "$TARGET" ]; then
            SRC="target/${TARGET}/release/${BIN}${EXT}"
          fi
          cp "$SRC" "dist/${BIN}-${VERSION}-${PLATFORM}${EXT}"

      - name: Attest build provenance
        # Tag-only: dry-runs publish no persistent attestations (see header).
        if: startsWith(github.ref, 'refs/tags/')
        # v4.1.0
        uses: >-
          actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: dist/*

      - name: Upload artifact
        # v7.0.1
        uses: >-
          actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: >-
            ${{ matrix.bin }}-${{
            needs.meta.outputs.version }}-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error

  # Source snapshot: a reproducible, PUBLISHED tarball that serves as the
  # verifiable subject for the quality-gate attestations below. Because the
  # exact bytes are published as a release asset, `gh attestation verify` can
  # run against it from any workstation.
  source:
    name: Source Snapshot
    needs: [meta]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      subject-name: ${{ steps.pack.outputs.name }}
      subject-digest: ${{ steps.pack.outputs.digest }}
    steps:
      - name: Checkout repository
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Pack source snapshot
        id: pack
        env:
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          NAME="mif-rs-${VERSION}-source.tar.gz"
          git archive --format=tar.gz --prefix="mif-rs-${VERSION}/" \
            -o "dist/${NAME}" "${GITHUB_SHA}"
          DIGEST=$(sha256sum "dist/${NAME}" | cut -d' ' -f1)
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "digest=sha256:${DIGEST}" >> "$GITHUB_OUTPUT"
      - name: Attest build provenance
        # Tag-only: dry-runs publish no persistent attestations (see header).
        if: startsWith(github.ref, 'refs/tags/')
        # v4.1.0
        uses: >-
          actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: dist/${{ steps.pack.outputs.name }}
      - name: Upload source artifact
        # v7.0.1
        uses: >-
          actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: mif-rs-${{ needs.meta.outputs.version }}-source
          path: dist/${{ steps.pack.outputs.name }}
          if-no-files-found: error

  test:
    # Tags are not guaranteed to point at CI-green commits; the release
    # publishes nothing untested.
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Rust toolchain
        # master
        uses: >-
          dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable

      - name: Run tests
        run: cargo test --workspace --all-features --locked

  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install cargo-audit
        # v2.67.25
        uses: >-
          taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853
        with:
          tool: cargo-audit

      - name: Audit dependencies for known vulnerabilities
        run: cargo audit

  sbom:
    name: SBOM (generate + attest)
    needs: [meta, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout repository
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Download all binaries
        # v8.0.1
        uses: >-
          actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          # Every platform binary, across every [[bin]] target:
          # {bin}-{version}-{os}-{arch} — a wildcard bin prefix since this
          # matches both mif-cli and mif-mcp. Excludes the -sbom / -source
          # artifacts and the gate SARIFs (neither has a hyphenated platform
          # suffix) so the SBOM is generated over exactly the binaries.
          pattern: "*-${{ needs.meta.outputs.version }}-*-*"
          path: dist
          merge-multiple: true

      - name: Generate CycloneDX SBOM
        # v0.24.0
        uses: >-
          anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: .
          format: cyclonedx-json
          output-file: mif-rs-${{ needs.meta.outputs.version }}-sbom.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest SBOM (binds every binary to the SBOM)
        # Tag-only: dry-runs publish no persistent attestations (see header).
        if: startsWith(github.ref, 'refs/tags/')
        # v4.1.0
        uses: >-
          actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e
        with:
          subject-path: dist/*
          sbom-path: mif-rs-${{ needs.meta.outputs.version }}-sbom.cdx.json

      - name: Upload SBOM artifact
        # v7.0.1
        uses: >-
          actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: mif-rs-${{ needs.meta.outputs.version }}-sbom
          path: mif-rs-${{ needs.meta.outputs.version }}-sbom.cdx.json
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Quality-gate attestation seam — SAST (CodeQL), SCA (OSV), and IaC/license
  # (Trivy) verdicts signed over the published source snapshot, then fail-closed
  # verified in the `verify` job before release.
  #
  # Every gate verdict that characterizes the shipped artifact — SAST (CodeQL),
  # SCA (OSV), IaC/license (Trivy), container-scan (Trivy image), and DAST (ZAP)
  # — is signed and attested at release, bound to the release subject by digest.
  # SAST analyzes the exact source that ships, so its verdict travels with the
  # release like the others. Supply-chain posture (Scorecard) is a repo-level
  # signal, not an artifact verdict.
  # ---------------------------------------------------------------------------
  gate-sast:
    name: Gate — SAST (CodeQL)
    needs: [meta]
    permissions:
      security-events: write
      contents: read
      actions: read
      packages: read   # reusable's analyze job declares it (CodeQL pkg resolution)
    # modeled-information-format/.github main @ e50b004c (2026-07-01)
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-sast-codeql.yml@05b13774259a17140419556a45a48ba6a3e36e0c
    with:
      languages: rust
      build-mode: none

  gate-sca:
    name: Gate — SCA (OSV)
    needs: [meta]
    permissions:
      actions: read
      contents: read
      security-events: write
      pull-requests: write   # reusable's (skipped) dependency-review job declares it
    # modeled-information-format/.github main @ e50b004c (2026-07-01)
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-sca-osv.yml@05b13774259a17140419556a45a48ba6a3e36e0c
    with:
      fail-on-severity: high
      scan-args: |-
        --lockfile=Cargo.lock

  gate-trivy:
    name: Gate — Trivy (IaC/license)
    needs: [meta]
    permissions:
      contents: read
      security-events: write
      actions: read
      packages: read   # reusable's (skipped) image job declares it
    # modeled-information-format/.github main @ e50b004c (2026-07-01)
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-trivy.yml@e50b004cbdcf2b3258d223b1f6a4d98ff7938abf
    with:
      scan-iac: true

  attest-sca:
    name: Attest — SCA
    # Tag-only: dry-runs publish no persistent attestations (see header).
    if: startsWith(github.ref, 'refs/tags/')
    needs: [meta, source, gate-sca]
    permissions:
      id-token: write
      attestations: write
      contents: read
    # modeled-information-format/.github main @ e50b004c (2026-07-01)
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-attest-scan.yml@05b13774259a17140419556a45a48ba6a3e36e0c
    with:
      subject-name: ${{ needs.source.outputs.subject-name }}
      subject-digest: ${{ needs.source.outputs.subject-digest }}
      predicate-type: https://modeled-information-format.github.io/attestations/sca/v1
      predicate-artifact: ${{ needs.gate-sca.outputs.sarif-artifact }}
      predicate-filename: ${{ needs.gate-sca.outputs.sarif-filename }}

  attest-iac-license:
    name: Attest — IaC/license
    # Tag-only: dry-runs publish no persistent attestations (see header).
    if: startsWith(github.ref, 'refs/tags/')
    needs: [meta, source, gate-trivy]
    permissions:
      id-token: write
      attestations: write
      contents: read
    # modeled-information-format/.github main @ e50b004c (2026-07-01)
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-attest-scan.yml@05b13774259a17140419556a45a48ba6a3e36e0c
    with:
      subject-name: ${{ needs.source.outputs.subject-name }}
      subject-digest: ${{ needs.source.outputs.subject-digest }}
      predicate-type: https://modeled-information-format.github.io/attestations/iac-license/v1
      predicate-artifact: ${{ needs.gate-trivy.outputs.sarif-artifact }}
      predicate-filename: ${{ needs.gate-trivy.outputs.sarif-filename }}

  attest-sast:
    name: Attest — SAST
    # Tag-only: dry-runs publish no persistent attestations (see header).
    if: startsWith(github.ref, 'refs/tags/')
    needs: [meta, source, gate-sast]
    permissions:
      id-token: write
      attestations: write
      contents: read
    # modeled-information-format/.github main @ e50b004c (2026-07-01)
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-attest-scan.yml@05b13774259a17140419556a45a48ba6a3e36e0c
    with:
      subject-name: ${{ needs.source.outputs.subject-name }}
      subject-digest: ${{ needs.source.outputs.subject-digest }}
      predicate-type: https://modeled-information-format.github.io/attestations/sast/v1
      predicate-artifact: ${{ needs.gate-sast.outputs.sarif-artifact }}
      predicate-filename: ${{ needs.gate-sast.outputs.sarif-filename }}

  # OpenVEX vulnerability disposition, self-signed by reusable-vex.yml (its own
  # signer identity) bound to the source snapshot. Maintain the disposition in
  # .vex/openvex.json so the deploy gate can enforce "no UNDISPOSITIONED
  # high/critical" rather than "zero findings".
  vex:
    name: Gate — VEX (OpenVEX)
    # Tag-only: dry-runs publish no persistent attestations (see header).
    if: startsWith(github.ref, 'refs/tags/')
    needs: [meta, source]
    permissions:
      id-token: write
      attestations: write
      contents: read
    # modeled-information-format/.github main @ e50b004c (2026-07-01)
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-vex.yml@e50b004cbdcf2b3258d223b1f6a4d98ff7938abf
    with:
      subject-name: ${{ needs.source.outputs.subject-name }}
      subject-digest: ${{ needs.source.outputs.subject-digest }}
      vex-path: .vex/openvex.json

  verify:
    name: Verify Attestations
    # Tag-only: there is nothing to verify on a dry-run (no attestations minted).
    if: startsWith(github.ref, 'refs/tags/')
    needs: [meta, build, sbom, source, attest-sca, attest-iac-license, attest-sast, vex]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: read
    steps:
      - name: Download all artifacts
        # v8.0.1
        uses: >-
          actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          # Release artifacts only ({name}-{version}-*): every platform
          # binary (across every [[bin]] target), the SBOM, and the source
          # snapshot. Excludes the gate SARIF artifacts, which carry no
          # {name}-{version} prefix.
          pattern: "*-${{ needs.meta.outputs.version }}-*"
          path: dist
          merge-multiple: true

      - name: Fail-closed attestation verification
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          SEAM: modeled-information-format/.github/.github/workflows/reusable-attest-scan.yml
          VEX_SIGNER: modeled-information-format/.github/.github/workflows/reusable-vex.yml
          BIN_COUNT: ${{ needs.meta.outputs.bin-count }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist/*)
          # (bin-count platform binaries per bin x 5 platforms) + SBOM
          # document + source snapshot tarball. A partial set must never
          # reach the release. Computed from bin-count, not hardcoded, so a
          # future third binary crate doesn't silently desync this check.
          EXPECTED=$(( BIN_COUNT * 5 + 2 ))
          if [ "${#files[@]}" -ne "$EXPECTED" ]; then
            echo "::error::expected ${EXPECTED} artifacts, found ${#files[@]}"
            exit 1
          fi
          for f in "${files[@]}"; do
            case "$f" in
              *-sbom.cdx.json)
                # The SBOM document itself is not an attestation subject.
                continue ;;
              *-source.tar.gz)
                # Source snapshot: provenance + the seam-signed gate verdicts.
                echo "Verifying provenance: ${f}"
                gh attestation verify "$f" --repo "$GITHUB_REPOSITORY" \
                  --predicate-type https://slsa.dev/provenance/v1
                for pt in sast sca iac-license; do
                  echo "Verifying gate (${pt}): ${f}"
                  gh attestation verify "$f" --owner "$OWNER" \
                    --signer-workflow "$SEAM" \
                    --predicate-type \
                    "https://modeled-information-format.github.io/attestations/${pt}/v1"
                done
                echo "Verifying VEX disposition: ${f}"
                gh attestation verify "$f" --owner "$OWNER" \
                  --signer-workflow "$VEX_SIGNER" \
                  --predicate-type https://openvex.dev/ns/v0.2.0
                continue ;;
              *)
                # Platform binary: provenance + SBOM attestation.
                echo "Verifying provenance: ${f}"
                gh attestation verify "$f" --repo "$GITHUB_REPOSITORY" \
                  --predicate-type https://slsa.dev/provenance/v1
                echo "Verifying SBOM attestation: ${f}"
                gh attestation verify "$f" --repo "$GITHUB_REPOSITORY" \
                  --predicate-type https://cyclonedx.org/bom ;;
            esac
          done

  release:
    name: Create Release
    # A GitHub Release is a tag primitive — it does NOT depend on external
    # publication. Any pushed tag that passes the fail-closed `verify` gate
    # gets an attested GitHub Release. `publishable` (Cargo.toml `publish`)
    # gates only the EXTERNAL channels: crates.io (publish.yml), the container
    # image (pipeline.yml), and Homebrew (package-homebrew.yml).
    if: startsWith(github.ref, 'refs/tags/')
    needs: [meta, verify, audit, test]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        # v8.0.1
        uses: >-
          actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          # Release artifacts only ({name}-{version}-*): binaries (every
          # [[bin]] target), SBOM, and the source snapshot — excludes the
          # gate SARIF artifacts.
          pattern: "*-${{ needs.meta.outputs.version }}-*"
          path: dist
          merge-multiple: true

      - name: Generate checksums
        env:
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          cd dist
          sha256sum -- * > "mif-rs-${VERSION}-checksums.txt"

      - name: Create GitHub Release
        # v3.0.0
        uses: >-
          softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ needs.meta.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: dist/*
        env:
          # A PAT (when configured) lets the release event propagate to
          # downstream workflows; the workflow_run trigger on the
          # Homebrew workflow is the reliable fallback either way.
          GITHUB_TOKEN: >-
            ${{ secrets.HOMEBREW_TAP_TOKEN || secrets.GITHUB_TOKEN }}
