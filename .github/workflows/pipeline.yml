---
name: Pipeline

"on":
  push:
    branches: [main, master]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      stage:
        description: "Pipeline stage to run"
        type: choice
        options:
          - all
          - ci
          - docker
        default: ci

concurrency:
  group: >-
    ${{ github.workflow }}-${{
    github.ref_type == 'tag'
    && github.sha || github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

# Least privilege at the top: read-only. Every job that needs a write scope
# (packages for the docker push, id-token/attestations for signing,
# security-events for SARIF) declares it at the job level below.
permissions:
  contents: read
  actions: read

jobs:
  # -----------------------------------------------------------
  # Gate — resolve template state from Cargo.toml `publish`.
  # `publish = false` (template) reports `publish == []`, which
  # disables the container build/sign/verify chain. Deleting that
  # line in a downstream project arms it. Same switch that gates
  # crates.io publishing, GitHub Releases, and Homebrew.
  # -----------------------------------------------------------
  gate:
    name: Resolve Publish Gate
    runs-on: ubuntu-latest
    outputs:
      publishable: ${{ steps.gate.outputs.publishable }}
    steps:
      - name: Checkout repository
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Rust toolchain
        # master
        uses: >-
          dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537
        with:
          toolchain: stable

      - name: Resolve publish gate from Cargo.toml
        id: gate
        run: |
          set -euo pipefail
          META=$(cargo metadata --no-deps --locked --format-version 1)
          # `publish = false` => `.publish == []` => template state.
          PUBLISHABLE=$(jq -r \
            'if .packages[0].publish == [] then "false" else "true" end' \
            <<< "$META")
          echo "publishable=${PUBLISHABLE}" >> "$GITHUB_OUTPUT"
          echo "Resolved publishable: ${PUBLISHABLE}"

  # -----------------------------------------------------------
  # CI Stage — runs on every push, PR, and tag
  # -----------------------------------------------------------
  ci:
    name: CI Checks
    # stage 'docker' includes ci so the docker -> sign -> verify
    # chain is exercisable via dispatch (docker needs ci)
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.stage == 'all'
      || inputs.stage == 'ci'
      || inputs.stage == 'docker'
    uses: ./.github/workflows/ci-checks.yml
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  coverage:
    name: Code Coverage
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.stage == 'all'
      || inputs.stage == 'ci'
    uses: ./.github/workflows/ci-coverage.yml
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test-matrix:
    name: Test Matrix
    if: >-
      github.event_name == 'pull_request'
      || (github.event_name == 'workflow_dispatch'
      && (inputs.stage == 'all'
      || inputs.stage == 'ci'))
    uses: ./.github/workflows/ci-test-matrix.yml

  # Required check context: "pin-check / pin-check" — asserts every
  # `uses:` reference is pinned to a full 40-char commit SHA.
  pin-check:
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.stage == 'all'
      || inputs.stage == 'ci'
    permissions:
      contents: read
    # attested-delivery/.github main @ ca91728 (2026-06-23)
    uses: >-
      attested-delivery/.github/.github/workflows/pin-check.yml@ca91728c87beb08742325b4ed4d06fcfb261435b

  # -----------------------------------------------------------
  # Docker — after CI; PR = build-only, push on main/tags
  # -----------------------------------------------------------
  docker:
    name: Docker
    needs: [ci, gate]
    # packages:write only here — the reusable pushes the image to GHCR.
    permissions:
      contents: read
      packages: write
    # Container build is gated on template state: skipped while
    # `publish = false` (template), armed once that line is deleted.
    if: >-
      needs.gate.outputs.publishable == 'true'
      && (github.event_name != 'workflow_dispatch'
      || inputs.stage == 'all'
      || inputs.stage == 'docker')
    uses: ./.github/workflows/release-docker.yml
    with:
      push: >-
        ${{ github.event_name != 'pull_request' }}

  # -----------------------------------------------------------
  # Image attestation — centralized signer (SLSA Build L3
  # isolation boundary), then a fail-closed verify gate
  # -----------------------------------------------------------
  docker-sign:
    name: Sign and Attest Image
    needs: [docker]
    if: >-
      github.event_name != 'pull_request'
      && (github.event_name != 'workflow_dispatch'
      || inputs.stage == 'all'
      || inputs.stage == 'docker')
    permissions:
      id-token: write
      attestations: write
      packages: write
      contents: read
    # attested-delivery/.github main @ ca91728 (2026-06-23)
    uses: >-
      attested-delivery/.github/.github/workflows/sign-and-attest.yml@ca91728c87beb08742325b4ed4d06fcfb261435b
    with:
      image-name: ghcr.io/${{ github.repository }}
      image-digest: ${{ needs.docker.outputs.image-digest }}

  docker-verify:
    name: Verify Image Attestations
    needs: [docker, docker-sign]
    if: >-
      github.event_name != 'pull_request'
      && (github.event_name != 'workflow_dispatch'
      || inputs.stage == 'all'
      || inputs.stage == 'docker')
    permissions:
      id-token: write
      attestations: read
      packages: read
      contents: read
    # attested-delivery/.github main @ ca91728 (2026-06-23)
    uses: >-
      attested-delivery/.github/.github/workflows/verify-attestation.yml@ca91728c87beb08742325b4ed4d06fcfb261435b
    with:
      image-ref: >-
        ghcr.io/${{ github.repository }}@${{
        needs.docker.outputs.image-digest }}
      attestation-repo: ${{ github.repository }}

  # -----------------------------------------------------------
  # Container vulnerability gate attestation (gh-attested) —
  # Trivy image scan signed and bound to the image digest, with
  # the same publish + non-PR gating as the docker chain above.
  # Dormant in template state (docker is gated on `publishable`).
  # -----------------------------------------------------------
  gate-image:
    name: Gate — Trivy (image)
    needs: [docker]
    if: >-
      github.event_name != 'pull_request'
      && (github.event_name != 'workflow_dispatch'
      || inputs.stage == 'all'
      || inputs.stage == 'docker')
    permissions:
      contents: read
      security-events: write
      actions: read
      packages: read
    # attested-delivery/.github main @ ca91728 (2026-06-23)
    uses: >-
      attested-delivery/.github/.github/workflows/reusable-trivy.yml@ca91728c87beb08742325b4ed4d06fcfb261435b
    with:
      image-ref: >-
        ghcr.io/${{ github.repository }}@${{
        needs.docker.outputs.image-digest }}
      scan-iac: false

  attest-container-scan:
    name: Attest — Container scan
    needs: [docker, gate-image]
    if: >-
      github.event_name != 'pull_request'
      && (github.event_name != 'workflow_dispatch'
      || inputs.stage == 'all'
      || inputs.stage == 'docker')
    permissions:
      id-token: write
      attestations: write
      contents: read
    # attested-delivery/.github main @ ca91728 (2026-06-23)
    uses: >-
      attested-delivery/.github/.github/workflows/reusable-attest-scan.yml@ca91728c87beb08742325b4ed4d06fcfb261435b
    with:
      subject-name: ghcr.io/${{ github.repository }}
      subject-digest: ${{ needs.docker.outputs.image-digest }}
      predicate-type: https://attested-delivery.github.io/attestations/container-scan/v1
      predicate-artifact: ${{ needs.gate-image.outputs.image-sarif-artifact }}
      predicate-filename: ${{ needs.gate-image.outputs.image-sarif-filename }}
