---
name: Pipeline

"on":
  push:
    branches: [main, master]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      stage:
        description: "Pipeline stage to run"
        type: choice
        options:
          - all
          - ci
          - docker
        default: ci

concurrency:
  group: >-
    ${{ github.workflow }}-${{
    github.ref_type == 'tag'
    && github.sha || github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

# Least privilege at the top: read-only. Every job that needs a write scope
# (packages for the docker push, id-token/attestations for signing,
# security-events for SARIF) declares it at the job level below.
permissions:
  contents: read
  actions: read

jobs:
  # -----------------------------------------------------------
  # Gate — resolve two independent booleans from cargo metadata, workspace-
  # wide (never .packages[0] — this is a 5-member workspace):
  #   - crates-publishable: does ANY member have publish != false? Gates
  #     nothing about binaries; a library can be publish=true long before
  #     any bin target exists.
  #   - has-bin-target: does ANY member have a [[bin]] target? Gates the
  #     docker chain. mif-cli and mif-mcp are real from day one, so this is
  #     true immediately, but stays dynamic rather than hardcoded so a
  #     future third binary crate needs zero workflow changes.
  # -----------------------------------------------------------
  gate:
    name: Resolve Publish/Build Gates
    runs-on: ubuntu-latest
    outputs:
      crates-publishable: ${{ steps.gate.outputs.crates-publishable }}
      has-bin-target: ${{ steps.gate.outputs.has-bin-target }}
    steps:
      - name: Checkout repository
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Rust toolchain
        # master
        uses: >-
          dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable

      - name: Resolve gates from cargo metadata
        id: gate
        run: |
          set -euo pipefail
          META=$(cargo metadata --no-deps --locked --format-version 1)
          PUBLISHABLE=$(jq -r \
            '[.packages[] | select(.publish != [])] | length > 0' \
            <<< "$META")
          HAS_BIN=$(jq -r \
            '[.packages[].targets[] | select(.kind | index("bin"))] | length > 0' \
            <<< "$META")
          echo "crates-publishable=${PUBLISHABLE}" >> "$GITHUB_OUTPUT"
          echo "has-bin-target=${HAS_BIN}" >> "$GITHUB_OUTPUT"
          echo "Resolved crates-publishable: ${PUBLISHABLE}, has-bin-target: ${HAS_BIN}"

  # -----------------------------------------------------------
  # CI Stage — runs on every push, PR, and tag
  # -----------------------------------------------------------
  ci:
    name: CI Checks
    # stage 'docker' includes ci so the docker -> sign -> verify
    # chain is exercisable via dispatch (docker needs ci)
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.stage == 'all'
      || inputs.stage == 'ci'
      || inputs.stage == 'docker'
    uses: ./.github/workflows/ci-checks.yml
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  coverage:
    name: Code Coverage
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.stage == 'all'
      || inputs.stage == 'ci'
    uses: ./.github/workflows/ci-coverage.yml
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Required check context: "pin-check / pin-check" — asserts every
  # `uses:` reference is pinned to a full 40-char commit SHA.
  pin-check:
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.stage == 'all'
      || inputs.stage == 'ci'
    permissions:
      contents: read
    # modeled-information-format/.github main @ e50b004c (2026-07-01)
    uses: >-
      modeled-information-format/.github/.github/workflows/pin-check.yml@e50b004cbdcf2b3258d223b1f6a4d98ff7938abf

  # Required check context: "validate-workflows / actionlint" — lints every
  # workflow file for syntax/semantic errors (separate concern from pin-check's
  # SHA-pinning enforcement).
  validate-workflows:
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.stage == 'all'
      || inputs.stage == 'ci'
    permissions:
      contents: read
    # modeled-information-format/.github main @ e50b004c (2026-07-01)
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-actionlint.yml@e50b004cbdcf2b3258d223b1f6a4d98ff7938abf

  # -----------------------------------------------------------
  # Docker — after CI; PR = build-only, push on main/tags
  # -----------------------------------------------------------
  docker:
    name: Docker
    needs: [ci, gate]
    # packages:write only here — the reusable pushes the image to GHCR.
    permissions:
      contents: read
      packages: write
    # Container build is gated on whether the workspace has any [[bin]]
    # target — true from day one here (mif-cli, mif-mcp), but resolved
    # dynamically rather than hardcoded so a future binary crate needs no
    # workflow changes to join the docker chain.
    if: >-
      needs.gate.outputs.has-bin-target == 'true'
      && (github.event_name != 'workflow_dispatch'
      || inputs.stage == 'all'
      || inputs.stage == 'docker')
    uses: ./.github/workflows/release-docker.yml
    with:
      push: >-
        ${{ github.event_name != 'pull_request' }}
      # arm64 goes through slow QEMU emulation — only worth paying for on an
      # actual release (tag push), not every push to main. release-docker.yml
      # defaults to amd64-only otherwise.
      platforms: >-
        ${{ github.ref_type == 'tag' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}

  # -----------------------------------------------------------
  # Image attestation — centralized signer (SLSA Build L3
  # isolation boundary), then a fail-closed verify gate. Matrixed over
  # every [[bin]] target's image (mif-cli, mif-mcp): `docker`'s own
  # `bins`/`image-digests` outputs are NOT themselves matrix-collapsed
  # (docker is a single non-matrixed job here; the matrixing — and its
  # digest-collision handling — lives inside release-docker.yml), so each
  # cell safely looks up its own bin's digest.
  # -----------------------------------------------------------
  docker-sign:
    name: Sign and Attest Image (${{ matrix.bin }})
    needs: [docker]
    if: >-
      github.event_name != 'pull_request'
      && (github.event_name != 'workflow_dispatch'
      || inputs.stage == 'all'
      || inputs.stage == 'docker')
    strategy:
      fail-fast: false
      matrix:
        bin: ${{ fromJson(needs.docker.outputs.bins) }}
    permissions:
      id-token: write
      attestations: write
      packages: write
      contents: read
    # modeled-information-format/.github main @ e50b004c (2026-07-01)
    uses: >-
      modeled-information-format/.github/.github/workflows/sign-and-attest.yml@e50b004cbdcf2b3258d223b1f6a4d98ff7938abf
    with:
      image-name: ghcr.io/${{ github.repository }}/${{ matrix.bin }}
      image-digest: >-
        ${{ fromJson(needs.docker.outputs.image-digests)[matrix.bin] }}

  docker-verify:
    name: Verify Image Attestations (${{ matrix.bin }})
    needs: [docker, docker-sign]
    if: >-
      github.event_name != 'pull_request'
      && (github.event_name != 'workflow_dispatch'
      || inputs.stage == 'all'
      || inputs.stage == 'docker')
    strategy:
      fail-fast: false
      matrix:
        bin: ${{ fromJson(needs.docker.outputs.bins) }}
    permissions:
      id-token: write
      attestations: read
      packages: read
      contents: read
    # modeled-information-format/.github main @ e50b004c (2026-07-01)
    uses: >-
      modeled-information-format/.github/.github/workflows/verify-attestation.yml@e50b004cbdcf2b3258d223b1f6a4d98ff7938abf
    with:
      image-ref: >-
        ghcr.io/${{ github.repository }}/${{ matrix.bin }}@${{
        fromJson(needs.docker.outputs.image-digests)[matrix.bin] }}
      attestation-repo: ${{ github.repository }}

  # -----------------------------------------------------------
  # Container vulnerability gate attestation (gh-attested) — Trivy image
  # scan signed and bound to the image digest.
  #
  # Deliberately NOT matrixed over bins, unlike docker-sign/docker-verify
  # above: reusable-trivy.yml's sarif-artifact/sarif-filename outputs are
  # fixed constants ("container-scan-sarif" / "trivy-image.sarif"), not
  # per-call-unique — a second matrix cell calling it in the same run would
  # collide on that artifact name (upload-artifact rejects a duplicate name
  # within one run). Both images share the same base (distroless/cc-debian12)
  # and dependency tree (the Dockerfile COPYs and builds from the same
  # workspace checkout), so a Trivy scan of one is representative of the
  # other for base-image/dependency CVEs — scan the first resolved bin.
  # -----------------------------------------------------------
  gate-image:
    name: Gate — Trivy (image)
    needs: [docker]
    if: >-
      github.event_name != 'pull_request'
      && (github.event_name != 'workflow_dispatch'
      || inputs.stage == 'all'
      || inputs.stage == 'docker')
    permissions:
      contents: read
      security-events: write
      actions: read
      packages: read
    # modeled-information-format/.github main @ 7c56346c (2026-07-02)
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-trivy.yml@7c56346c4bc47b15f08d44889116486583a1a7ac
    with:
      image-ref: >-
        ghcr.io/${{ github.repository }}/${{
        fromJson(needs.docker.outputs.bins)[0] }}@${{
        fromJson(needs.docker.outputs.image-digests)[fromJson(needs.docker.outputs.bins)[0]] }}
      scan-iac: false

  attest-container-scan:
    name: Attest — Container scan
    needs: [docker, gate-image]
    if: >-
      github.event_name != 'pull_request'
      && (github.event_name != 'workflow_dispatch'
      || inputs.stage == 'all'
      || inputs.stage == 'docker')
    permissions:
      id-token: write
      attestations: write
      contents: read
    # modeled-information-format/.github main @ e50b004c (2026-07-01)
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-attest-scan.yml@e50b004cbdcf2b3258d223b1f6a4d98ff7938abf
    with:
      subject-name: >-
        ghcr.io/${{ github.repository }}/${{
        fromJson(needs.docker.outputs.bins)[0] }}
      subject-digest: >-
        ${{ fromJson(needs.docker.outputs.image-digests)[fromJson(needs.docker.outputs.bins)[0]] }}
      predicate-type: https://modeled-information-format.github.io/attestations/container-scan/v1
      predicate-artifact: ${{ needs.gate-image.outputs.image-sarif-artifact }}
      predicate-filename: ${{ needs.gate-image.outputs.image-sarif-filename }}
