name: Fuzz Testing

on:
  # schedule:
  #   - cron: '0 2 * * *'  # Daily at 2 AM
  workflow_dispatch:
    inputs:
      duration:
        description: 'Fuzz duration in seconds'
        required: false
        default: '300'
      target:
        description: 'Specific fuzz target to run'
        required: false
        default: ''

permissions:
  contents: read
  issues: write

jobs:
  fuzz:
    name: Fuzz Testing with cargo-fuzz
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust nightly
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: nightly

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@9bcaee1dcae34154180f412e2fa69355a7cda9f6 # v2.82.6
        with:
          tool: cargo-fuzz@0.12.0

      - name: Cache fuzz corpus
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: fuzz/corpus
          key: ${{ runner.os }}-fuzz-corpus-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-fuzz-corpus-

      - name: Initialize fuzz directory if needed
        run: |
          if [ ! -d "fuzz" ]; then
            cargo fuzz init
            echo "Fuzz directory initialized. Add fuzz targets to fuzz/fuzz_targets/"
          fi

      - name: List fuzz targets
        id: targets
        run: |
          # shellcheck disable=SC2086,SC2011
          if [ -d "fuzz/fuzz_targets" ]; then
            TARGETS=$(find fuzz/fuzz_targets -name '*.rs' -print0 | xargs -0 -n1 basename | sed 's/\.rs$//' | tr '\n' ' ' | sed 's/ $//' || echo "")
            echo "targets=$TARGETS" >> "$GITHUB_OUTPUT"
            echo "Found targets: $TARGETS"
          else
            echo "targets=" >> "$GITHUB_OUTPUT"
            echo "No fuzz targets found"
          fi

      - name: Run fuzz tests
        if: steps.targets.outputs.targets != ''
        run: |
          DURATION="${{ github.event.inputs.duration || '300' }}"
          TARGET="${{ github.event.inputs.target }}"
          
          mkdir -p fuzz-results
          
          if [ -n "$TARGET" ]; then
            echo "Running fuzz target: $TARGET for ${DURATION}s"
            timeout ${DURATION}s cargo fuzz run $TARGET -- -max_total_time=${DURATION} || true
          else
            for target in ${{ steps.targets.outputs.targets }}; do
              echo "Running fuzz target: $target for ${DURATION}s"
              timeout ${DURATION}s cargo fuzz run $target -- -max_total_time=${DURATION} || true
            done
          fi

      - name: Check for crashes
        if: steps.targets.outputs.targets != ''
        id: crashes
        run: |
          # shellcheck disable=SC2046,SC2086,SC2129
          if [ -d "fuzz/artifacts" ] && [ "$(ls -A fuzz/artifacts 2>/dev/null)" ]; then
            echo "crashes=true" >> "$GITHUB_OUTPUT"
            {
              echo "# Fuzz Testing Crashes Detected"
              echo ""
              for artifact in fuzz/artifacts/*/*; do
                if [ -f "$artifact" ]; then
                  echo "## Crash: $(basename "$(dirname "$artifact")")"
                  echo "File: $artifact"
                  echo '```'
                  xxd -l 256 "$artifact" || cat "$artifact"
                  echo '```'
                  echo ""
                fi
              done
            } > fuzz-report.md
          else
            echo "crashes=false" >> "$GITHUB_OUTPUT"
            {
              echo "# Fuzz Testing - No Crashes"
              echo "All fuzz targets completed successfully."
            } > fuzz-report.md
          fi

      - name: Upload fuzz artifacts
        if: always() && steps.targets.outputs.targets != ''
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: fuzz-results
          path: |
            fuzz-report.md
            fuzz/artifacts/
            fuzz/corpus/
          retention-days: 90

      - name: Create issue on crash
        if: steps.crashes.outputs.crashes == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('fuzz-report.md', 'utf8');
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Fuzz Testing: Crashes detected on ${new Date().toISOString().split('T')[0]}`,
              body: report,
              labels: ['bug', 'fuzz-testing', 'security']
            });
