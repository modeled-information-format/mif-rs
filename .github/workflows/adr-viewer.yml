---
name: ADR Viewer

"on":
  push:
    branches: [main, master]
    paths:
      - 'docs/adr/**'
  workflow_dispatch:

# Read-only: the job generates ADR HTML and uploads it as an artifact. It
# does not commit or deploy to Pages (Pages deployment is documented but not
# implemented here), so no write scopes are needed.
permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate:
    name: Generate HTML Viewer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Generate ADR HTML
        # main
        uses: modeled-information-format/adrscope@e6384bf222c179d4083e1003b17154e48fc0f914
        with:
          command: html
          adr-path: docs/adr
          output-path: adr-viewer

      - name: Upload artifact
        # v4.6.0
        uses: actions/upload-artifact@ea3f73d3e6f8268b4a40da165a72ca6a06e37770
        with:
          name: adr-viewer
          path: adr-viewer/
          retention-days: 90

# To enable GitHub Pages deployment, see:
# https://github.com/modeled-information-format/adrscope#github-pages-deployment
