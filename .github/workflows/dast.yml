---
name: DAST (attested)

# Attested DAST for adopters who deploy a service.
#
#   subject (provenance) → gate-dast (ZAP) → attest-dast (seam, dast/v1) → verify
#
# rust-template ships a CLI/library, not a web service, so there is no
# first-party DAST target. This workflow demonstrates the attested-DAST pattern:
# point `target` at YOUR deployed service (preview/staging) and the ZAP verdict
# is signed as dast/v1 bound to a release subject, then fail-closed verified. The
# default scans the org's own deployed site as a runnable placeholder.
#
# `fail-action: false` keeps the gate advisory: the verdict is signed and
# attested regardless of findings (signed ≠ passed — policy reads the predicate).
#
# OWNER ALLOW-LIST: reusable-zap.yml pulls `zaproxy/action-full-scan`. The org
# Actions allow-list must permit that ONE action — `zaproxy/action-full-scan@*`
# (or the exact pinned SHA) — NOT a `zaproxy/*` owner wildcard.

"on":
  workflow_dispatch:
    inputs:
      target:
        description: "URL of the running target to scan (your deployed service)"
        required: false
        default: "https://attested-delivery.github.io"
        type: string

permissions:
  contents: read

jobs:
  meta:
    name: Resolve Metadata
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.meta.outputs.name }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      # No checkout needed: this job only uses GitHub context values.
      - name: Resolve artifact name and version
        id: meta
        run: |
          set -euo pipefail
          echo "name=${GITHUB_REPOSITORY##*/}" >> "$GITHUB_OUTPUT"
          echo "version=0.0.0-dast" >> "$GITHUB_OUTPUT"

  # The subject the DAST verdict binds to: a provenance-attested source snapshot.
  subject:
    name: Subject Snapshot
    needs: [meta]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      subject-name: ${{ steps.pack.outputs.name }}
      subject-digest: ${{ steps.pack.outputs.digest }}
    steps:
      - name: Checkout repository
        # v6.0.3
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Pack subject snapshot
        id: pack
        env:
          NAME: ${{ needs.meta.outputs.name }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          FILE="${NAME}-${VERSION}.tar.gz"
          git archive --format=tar.gz --prefix="${NAME}-${VERSION}/" \
            -o "dist/${FILE}" "${GITHUB_SHA}"
          DIGEST=$(sha256sum "dist/${FILE}" | cut -d' ' -f1)
          echo "name=${FILE}" >> "$GITHUB_OUTPUT"
          echo "digest=sha256:${DIGEST}" >> "$GITHUB_OUTPUT"
      - name: Attest build provenance
        # v4.1.0
        uses: >-
          actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: dist/${{ steps.pack.outputs.name }}
      - name: Upload subject artifact
        # v7.0.1
        uses: >-
          actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-subject
          path: dist/${{ steps.pack.outputs.name }}
          if-no-files-found: error

  gate-dast:
    name: Gate — DAST (ZAP)
    needs: [meta]
    permissions:
      contents: read
    # attested-delivery/.github main @ ca91728 (2026-06-23)
    uses: >-
      attested-delivery/.github/.github/workflows/reusable-zap.yml@ca91728c87beb08742325b4ed4d06fcfb261435b
    with:
      target: ${{ inputs.target }}
      fail-action: false

  attest-dast:
    name: Attest — DAST
    needs: [meta, subject, gate-dast]
    permissions:
      id-token: write
      attestations: write
      contents: read
    # attested-delivery/.github main @ ca91728 (2026-06-23)
    uses: >-
      attested-delivery/.github/.github/workflows/reusable-attest-scan.yml@ca91728c87beb08742325b4ed4d06fcfb261435b
    with:
      subject-name: ${{ needs.subject.outputs.subject-name }}
      subject-digest: ${{ needs.subject.outputs.subject-digest }}
      predicate-type: https://attested-delivery.github.io/attestations/dast/v1
      predicate-artifact: ${{ needs.gate-dast.outputs.report-artifact }}
      predicate-filename: ${{ needs.gate-dast.outputs.report-filename }}

  verify:
    name: Verify Attestations (fail-closed)
    needs: [meta, subject, attest-dast]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: read
    steps:
      - name: Download subject artifact
        # v8.0.1
        uses: >-
          actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-subject
          path: subject
      - name: Fail-closed attestation verification
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          SEAM: attested-delivery/.github/.github/workflows/reusable-attest-scan.yml
          SUBJECT_NAME: ${{ needs.subject.outputs.subject-name }}
        run: |
          set -euo pipefail
          SUBJECT="subject/${SUBJECT_NAME}"
          echo "Verifying provenance: ${SUBJECT}"
          gh attestation verify "${SUBJECT}" \
            --repo "${GITHUB_REPOSITORY}" \
            --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/dast.yml" \
            --predicate-type https://slsa.dev/provenance/v1
          echo "Verifying DAST verdict (seam): ${SUBJECT}"
          gh attestation verify "${SUBJECT}" \
            --owner "${OWNER}" \
            --signer-workflow "${SEAM}" \
            --predicate-type https://attested-delivery.github.io/attestations/dast/v1
          echo "Verified: SLSA provenance + DAST verdict (dast/v1)"
