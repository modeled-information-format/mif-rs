---
name: Secrets Scan

# Thin caller of the org's central secret-scanning reusable. Replaces the
# licensed gitleaks-action (which requires a paid GITLEAKS_LICENSE for org
# repos) with the free, checksum-verified gitleaks binary + TruffleHog, and
# emits the Gitleaks SARIF to the code-scanning tab / attestation seam.

"on":
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secrets:
    name: Scan for Secrets
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: attested-delivery/.github/.github/workflows/reusable-secrets.yml@508aa7a385d3f6776feb175e40b3a0e9f08402c4 # v0.1.2
