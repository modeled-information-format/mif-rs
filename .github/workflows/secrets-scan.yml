---
name: Secrets Scan

# Thin caller of the org's central secret-scanning reusable. Replaces the
# licensed gitleaks-action (which requires a paid GITLEAKS_LICENSE for org
# repos) with the free, checksum-verified gitleaks binary + TruffleHog, and
# emits the Gitleaks SARIF to the code-scanning tab / attestation seam.

"on":
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secrets:
    name: Scan for Secrets
    permissions:
      contents: read
      security-events: write
      actions: read
    # modeled-information-format/.github main @ e50b004c (2026-07-01)
    uses: modeled-information-format/.github/.github/workflows/reusable-secrets.yml@1b416b97ff3ded8a49ae6873cc350eb1efb389bf
