---
name: Benchmark

"on":
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Read-only: the job runs `cargo bench` and uploads an artifact; it never
# commits, pushes, or stores results back to the repo.
permissions:
  contents: read

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # v6.0.2
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Install Rust toolchain
        # master
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537
        with:
          toolchain: stable

      - name: Run benchmarks
        run: cargo bench --workspace

      - name: Upload benchmark results
        # v4.6.2
        uses: actions/upload-artifact@47309c993abb98030a35d55ef7ff34b7fa1074b5
        with:
          name: benchmark-results
          path: target/criterion/
          retention-days: 30
