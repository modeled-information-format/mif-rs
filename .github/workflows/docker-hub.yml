name: Docker Hub Multi-Registry

# Disabled by default — this template uses GHCR via docker.yml.
# To enable, uncomment the push trigger and configure DOCKERHUB_USERNAME
# and DOCKERHUB_TOKEN secrets.
on:
  # push:
  #   tags:
  #     - 'v*'
  workflow_dispatch:

# Least privilege: read-all at the top; the publish job is granted
# packages:write only because it pushes images to GHCR.
permissions:
  contents: read

jobs:
  docker-publish:
    name: Publish to Multiple Registries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29a2f4d5cf86fc0f03e739f4d16e5a2c216f7d10 # v3.2.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b26438c0db58164f277c1b0fa8a05bc8eeb37351 # v3.8.0

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: |
            ${{ github.repository }}
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Login to Docker Hub
        uses: docker/login-action@74df6eb28a8d6879e01a15e28ad1c2947b75ce3c # v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@74df6eb28a8d6879e01a15e28ad1c2947b75ce3c # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v6.10.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ github.repository }}
          readme-filepath: ./README.md
